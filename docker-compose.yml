volumes:
  nats_data:
  nui_db:

networks:
  nats:

services:
  nats:
    container_name: nats_server
    image: nats:alpine
    ports:
      - "${NATS_CLIENT_PORT}:4222"
      - "${NATS_MONITOR_PORT}:8222"
    volumes:
      - nats_data:/data
    command:
      - "--js"
      - "--sd=/data"
      - "--http_port=8222"
    networks:
      - nats

  nui:
    container_name: nui
    image: ghcr.io/nats-nui/nui
    ports:
      - "${NUI_PORT}:31311"
    volumes:
      - nui_db:/db
    networks:
      - nats
    depends_on:
      - nats
